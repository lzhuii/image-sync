name: Sync Container Images to ACR

on:
  push:
    branches:
      - master

jobs:
  sync-images:
    runs-on: ubuntu-latest
    env:
      REGISTRY: registry.cn-beijing.aliyuncs.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install skopeo
        run: sudo apt-get install -y skopeo

      - name: Login to ACR
        run: skopeo login $REGISTRY -u "${{ secrets.ACR_USERNAME }}" -p "${{ secrets.ACR_PASSWORD }}"

      - name: Sync Images
        run: |
          while IFS='|' read -r namespace src; do
              image=${src##*/}
              skopeo copy --all docker://$src docker://$REGISTRY/$namespace/$image
          done < images.txt
