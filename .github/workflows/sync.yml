name: Sync Container Images to ACR

on:
  push:
    branches:
      - master

jobs:
  sync-images:
    runs-on: ubuntu-latest
    env:
      REGISTRY: registry.cn-beijing.aliyuncs.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install skopeo
        run: sudo apt-get install -y skopeo

      - name: Login to ACR
        run: skopeo login $REGISTRY -u "${{ secrets.ACR_USERNAME }}" -p "${{ secrets.ACR_PASSWORD }}"

      - name: Sync Images
        run: |
          skopeo copy --all docker://docker.io/library/postgres:18.3 docker://$REGISTRY/cn-infra/postgres:18.3
          skopeo copy --all docker://docker.io/library/redis:8.6.2 docker://$REGISTRY/cn-infra/redis:8.6.2
